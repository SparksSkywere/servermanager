<html>
<head>
    <link rel="stylesheet" type="text/css" href="mail-template.css">
</head>
<body>
    <h2>Server Alert: {server_name}</h2>
    <div class="info-box-alert">
        <strong>Status:</strong> {status}<br>
        <strong>Message:</strong> {message}<br>
        <strong>Server:</strong> {server_name}<br>
        <strong>Time:</strong> {timestamp}
    </div>
    <p>Please check the server status and take appropriate action if needed.</p>
    <br>
    <p class="signature">Best regards,<br>Server Manager Monitoring</p>
</body>
</html>
