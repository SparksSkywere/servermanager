<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Diagnostics - Server Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: #0f0f1a;
            color: #e8e8f0;
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #686888;
            text-decoration: none;
            margin-bottom: 30px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #667eea;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 1.75rem;
            margin-bottom: 10px;
        }

        .page-header p {
            color: #686888;
        }

        .test-card {
            background: #1a1a2e;
            border: 1px solid #2a2a45;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .test-card h3 {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .step-number {
            width: 28px;
            height: 28px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .test-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 15px;
        }

        .test-controls input {
            flex: 1;
            min-width: 150px;
            padding: 10px 14px;
            background: #252540;
            border: 1px solid #3a3a55;
            border-radius: 6px;
            color: #e8e8f0;
            font-size: 0.9rem;
        }

        .test-controls input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd6;
        }

        .btn-secondary {
            background: #252540;
            color: #e8e8f0;
            border: 1px solid #3a3a55;
        }

        .btn-secondary:hover {
            background: #2a2a48;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .result-box {
            background: #0f0f1a;
            border: 1px solid #2a2a45;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            color: #a8a8c0;
            min-height: 50px;
        }

        .result-box:empty::before {
            content: 'Awaiting test...';
            color: #686888;
            font-style: italic;
        }

        .success { color: #4ade80; }
        .error { color: #f87171; }
        .warning { color: #fbbf24; }
        .info { color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <a href="login.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5"></path>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Login
        </a>

        <div class="page-header">
            <h1>Authentication Diagnostics</h1>
            <p>Test and troubleshoot authentication issues</p>
        </div>

        <div class="test-card">
            <h3><span class="step-number">1</span> Server Connectivity</h3>
            <div class="test-controls">
                <button class="btn btn-primary" onclick="testServerConnection()">Test Connection</button>
            </div>
            <div id="serverResult" class="result-box"></div>
        </div>

        <div class="test-card">
            <h3><span class="step-number">2</span> Authentication Test</h3>
            <div class="test-controls">
                <input type="text" id="testUsername" placeholder="Username" value="admin">
                <input type="password" id="testPassword" placeholder="Password" value="admin">
                <button class="btn btn-primary" onclick="testAuthentication()">Test Login</button>
            </div>
            <div id="authResult" class="result-box"></div>
        </div>

        <div class="test-card">
            <h3><span class="step-number">3</span> Session Storage</h3>
            <div class="test-controls">
                <button class="btn btn-secondary" onclick="checkSessionStorage()">Check Session</button>
            </div>
            <div id="sessionResult" class="result-box"></div>
        </div>

        <div class="test-card">
            <h3><span class="step-number">4</span> API Endpoint</h3>
            <div class="test-controls">
                <button class="btn btn-secondary" onclick="testAPIEndpoint()">Test API</button>
            </div>
            <div id="apiResult" class="result-box"></div>
        </div>

        <div class="test-card">
            <h3><span class="step-number">5</span> Clear Session</h3>
            <div class="test-controls">
                <button class="btn btn-danger" onclick="clearAndLogin()">Clear & Go to Login</button>
            </div>
        </div>
    </div>

    <script>
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function setResultHtml(el, html) {
            el.innerHTML = html;
        }

        async function testServerConnection() {
            const result = document.getElementById('serverResult');
            setResultHtml(result, '<span class="info">Testing...</span>');

            try {
                const response = await fetch('/api/auth/login', { method: 'OPTIONS' });
                if (response.status === 200 || response.status === 404) {
                    setResultHtml(result, '<span class="success">✓ Server is responding</span>');
                } else {
                    setResultHtml(result, `<span class="warning">⚠ Status ${escapeHtml(String(response.status))}</span>`);
                }
            } catch (error) {
                setResultHtml(result, `<span class="error">✗ Cannot connect: ${escapeHtml(error.message)}</span>`);
            }
        }

        async function testAuthentication() {
            const result = document.getElementById('authResult');
            const username = document.getElementById('testUsername').value;
            const password = document.getElementById('testPassword').value;

            setResultHtml(result, '<span class="info">Testing...</span>');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    setResultHtml(result, `<span class="success">✓ Authentication successful</span><br><br>
                        <strong>Username:</strong> ${escapeHtml(String(data.username))}<br>
                        <strong>Admin:</strong> ${escapeHtml(String(data.isAdmin))}<br>
                        <strong>Token:</strong> ${escapeHtml(data.token.substring(0, 20))}...`);
                } else {
                    setResultHtml(result, `<span class="error">✗ Authentication failed</span><br><br>
                        <strong>Status:</strong> ${escapeHtml(String(response.status))}<br>
                        <strong>Error:</strong> ${escapeHtml(String(data.error || 'Unknown'))}`);
                }
            } catch (error) {
                setResultHtml(result, `<span class="error">✗ Error: ${escapeHtml(error.message)}</span>`);
            }
        }

        function checkSessionStorage() {
            const result = document.getElementById('sessionResult');
            const token = sessionStorage.getItem('auth_token');
            const username = sessionStorage.getItem('username');
            const isAdmin = sessionStorage.getItem('isAdmin');

            if (token || username) {
                setResultHtml(result, `<span class="success">✓ Session data found</span><br><br>
                    <strong>Token:</strong> ${token ? escapeHtml(token.substring(0, 20)) + '...' : 'Not set'}<br>
                    <strong>Username:</strong> ${escapeHtml(username || 'Not set')}<br>
                    <strong>Is Admin:</strong> ${escapeHtml(isAdmin || 'Not set')}`);
            } else {
                setResultHtml(result, '<span class="warning">⚠ No session data. Please log in first.</span>');
            }
        }

        async function testAPIEndpoint() {
            const result = document.getElementById('apiResult');
            const token = sessionStorage.getItem('auth_token');

            if (!token) {
                setResultHtml(result, '<span class="error">✗ No token. Log in first.</span>');
                return;
            }

            setResultHtml(result, '<span class="info">Testing...</span>');

            try {
                const response = await fetch('/api/auth/verify', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok && data.authenticated) {
                    setResultHtml(result, `<span class="success">✓ API working</span><br><br>
                        <strong>Authenticated:</strong> ${escapeHtml(String(data.authenticated))}<br>
                        <strong>Username:</strong> ${escapeHtml(String(data.username))}<br>
                        <strong>Admin:</strong> ${escapeHtml(String(data.isAdmin))}`);
                } else {
                    setResultHtml(result, `<span class="error">✗ API failed</span><br><br>
                        <strong>Status:</strong> ${escapeHtml(String(response.status))}<br>
                        <strong>Error:</strong> ${escapeHtml(String(data.error || 'Unknown'))}`);
                }
            } catch (error) {
                setResultHtml(result, `<span class="error">✗ Error: ${escapeHtml(error.message)}</span>`);
            }
        }

        function clearAndLogin() {
            sessionStorage.clear();
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Auto-check session on load
        window.addEventListener('load', checkSessionStorage);
    </script>
</body>
</html>
