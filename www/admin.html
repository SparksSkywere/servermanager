<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Server Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: #0f0f1a;
            color: #e8e8f0;
            min-height: 100vh;
        }

        body.theme-light { background: #f5f6fa; color: #1a1a2e; }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .header-brand svg { width: 28px; height: 28px; }

        .user-menu {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.2s;
            color: white;
        }

        .user-menu:hover { background: rgba(255,255,255,0.15); }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .user-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: #1a1a2e;
            border: 1px solid #2a2a45;
            border-radius: 12px;
            min-width: 220px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: none;
            z-index: 200;
            overflow: hidden;
        }

        body.theme-light .user-dropdown { background: #ffffff; border-color: #e0e0e8; }
        .user-dropdown.show { display: block; }

        .user-dropdown a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #e8e8f0;
            text-decoration: none;
            transition: background 0.15s;
        }

        body.theme-light .user-dropdown a { color: #1a1a2e; }
        .user-dropdown a:hover { background: #252540; }
        body.theme-light .user-dropdown a:hover { background: #f0f0f5; }
        .user-dropdown a.danger { color: #ef4444; }
        .user-dropdown .divider { height: 1px; background: #2a2a45; margin: 4px 0; }
        body.theme-light .user-dropdown .divider { background: #e0e0e8; }

        .nav {
            background: #1a1a2e;
            padding: 12px 24px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #2a2a45;
            flex-wrap: wrap;
        }

        body.theme-light .nav { background: #ffffff; border-color: #e0e0e8; }

        .nav a {
            padding: 10px 18px;
            background: #252540;
            color: #a8a8c0;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        body.theme-light .nav a { background: #f0f0f5; color: #4a4a68; }
        .nav a:hover { background: #2a2a48; color: #e8e8f0; }
        body.theme-light .nav a:hover { background: #e8eaed; color: #1a1a2e; }
        .nav a.active { background: #667eea; color: white; }

        .main { max-width: 1200px; margin: 0 auto; padding: 24px; }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 1000px) { .admin-grid { grid-template-columns: 1fr; } }

        .card {
            background: #1a1a2e;
            border: 1px solid #2a2a45;
            border-radius: 16px;
            overflow: hidden;
        }

        body.theme-light .card { background: #ffffff; border-color: #e0e0e8; }

        .card-header {
            padding: 16px 20px;
            background: #252540;
            border-bottom: 1px solid #2a2a45;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.theme-light .card-header { background: #f5f6fa; border-color: #e0e0e8; }
        .card-header h2 { font-size: 1rem; font-weight: 600; }

        .card-body { padding: 20px; }

        /* Table */
        .table-container { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; }

        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #2a2a45;
        }

        body.theme-light th, body.theme-light td { border-color: #e0e0e8; }

        th {
            background: #252540;
            font-weight: 600;
            font-size: 0.85rem;
            color: #a8a8c0;
        }

        body.theme-light th { background: #f5f6fa; color: #4a4a68; }

        td { font-size: 0.9rem; }

        tbody tr:hover { background: #252540; }
        body.theme-light tbody tr:hover { background: #f5f6fa; }

        .admin-badge {
            background: #ef4444;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        .user-actions { display: flex; gap: 8px; }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-sm { padding: 6px 10px; font-size: 0.8rem; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover:not(:disabled) { background: #5a6fd6; }
        .btn-secondary { background: #252540; color: #a8a8c0; border: 1px solid #3a3a55; }
        .btn-secondary:hover:not(:disabled) { background: #2a2a48; color: #e8e8f0; }
        body.theme-light .btn-secondary { background: #f0f0f5; color: #4a4a68; border-color: #d0d0d8; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover:not(:disabled) { background: #dc2626; }

        /* Forms */
        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #a8a8c0;
            margin-bottom: 8px;
            font-weight: 500;
        }

        body.theme-light .form-group label { color: #4a4a68; }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: #252540;
            border: 1px solid #3a3a55;
            border-radius: 8px;
            color: #e8e8f0;
            font-size: 0.95rem;
        }

        body.theme-light .form-group input,
        body.theme-light .form-group select {
            background: #f0f0f5;
            border-color: #d0d0d8;
            color: #1a1a2e;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input:disabled { opacity: 0.6; cursor: not-allowed; }

        .help-text { font-size: 0.8rem; color: #686888; margin-top: 6px; }
        .text-muted { color: #686888; }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.show { display: flex; }

        .modal-content {
            background: #1a1a2e;
            border: 1px solid #2a2a45;
            border-radius: 16px;
            width: 100%;
            max-width: 440px;
            overflow: hidden;
        }

        body.theme-light .modal-content { background: #ffffff; border-color: #e0e0e8; }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a45;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.theme-light .modal-header { border-color: #e0e0e8; }
        .modal-header h2 { font-size: 1.1rem; }

        .modal-close {
            background: none;
            border: none;
            color: #686888;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .modal-close:hover { color: #e8e8f0; }

        .modal-body { padding: 24px; }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox-label input { width: auto; }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .notification.show { display: block; }
        .notification.success { background: #22c55e; color: white; }
        .notification.error { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="8" rx="2"></rect>
                <rect x="2" y="14" width="20" height="8" rx="2"></rect>
                <circle cx="6" cy="6" r="1" fill="currentColor"></circle>
                <circle cx="6" cy="18" r="1" fill="currentColor"></circle>
            </svg>
            <span>Server Manager</span>
        </div>
        <div class="user-menu" onclick="toggleUserDropdown(event)">
            <div class="user-avatar" id="headerAvatar"><span id="avatarInitial">?</span></div>
            <span id="headerDisplayName">Admin</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"></path></svg>
        </div>
        <div class="user-dropdown" id="userDropdown">
            <a href="dashboard.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Dashboard
            </a>
            <a href="#" onclick="toggleTheme(); return false;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <span id="themeText">Dark Mode</span>
            </a>
            <div class="divider"></div>
            <a href="#" class="danger" onclick="logout(); return false;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Logout
            </a>
        </div>
    </header>

    <nav class="nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="create-server.html">Create Server</a>
        <a href="cluster.html">Cluster</a>
        <a href="admin.html" class="active">Admin</a>
    </nav>

    <main class="main">
        <div class="admin-grid">
            <!-- User Management -->
            <div class="card">
                <div class="card-header">
                    <h2>User Management</h2>
                    <button class="btn btn-primary btn-sm" onclick="showCreateUserModal()">Add User</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <tr><td colspan="4" class="text-muted" style="text-align:center;">Loading users...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- System Settings -->
            <div class="card">
                <div class="card-header">
                    <h2>System Settings</h2>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>Server Manager Port</label>
                        <input type="number" value="5000" disabled>
                        <div class="help-text">Change requires restart</div>
                    </div>
                    <div class="form-group">
                        <label>Auto-start Servers on Boot</label>
                        <select disabled>
                            <option value="true">Enabled</option>
                            <option value="false">Disabled</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Log Retention (Days)</label>
                        <input type="number" value="30" disabled>
                    </div>
                    <button class="btn btn-secondary" disabled>Save Settings</button>
                    <p class="text-muted" style="margin-top: 12px; font-size: 0.85rem;">System settings coming soon</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Create User Modal -->
    <div class="modal" id="createUserModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New User</h2>
                <button class="modal-close" onclick="hideCreateUserModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="createUserForm" onsubmit="handleCreateUser(event)">
                    <div class="form-group">
                        <label>Username *</label>
                        <input type="text" id="newUsername" required placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" id="newPassword" required placeholder="Min 6 characters">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="newEmail" placeholder="user@example.com">
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="newIsAdmin">
                            <span>Administrator privileges</span>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Create User</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div class="modal" id="resetPasswordModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Reset Password</h2>
                <button class="modal-close" onclick="hideResetPasswordModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 16px;">Reset password for: <strong id="resetUsername"></strong></p>
                <form id="resetPasswordForm" onsubmit="handleResetPassword(event)">
                    <div class="form-group">
                        <label>New Password *</label>
                        <input type="password" id="resetNewPassword" required placeholder="Min 6 characters">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Reset Password</button>
                </form>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        let currentTheme = localStorage.getItem('theme_preference') || 'dark';
        let currentResetUser = null;

        function applyTheme(theme) {
            currentTheme = theme;
            document.body.classList.remove('theme-light');
            if (theme === 'light') document.body.classList.add('theme-light');
            localStorage.setItem('theme_preference', theme);
            updateThemeUI();
        }

        function updateThemeUI() {
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            icon.innerHTML = currentTheme === 'dark' 
                ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>'
                : '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line>';
            text.textContent = currentTheme === 'dark' ? 'Dark Mode' : 'Light Mode';
        }

        async function toggleTheme() {
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
            try {
                const token = sessionStorage.getItem('auth_token');
                if (token) await fetch('/api/profile', { method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ theme_preference: newTheme }) });
            } catch {}
        }

        function showNotification(msg, type = 'info') {
            const el = document.getElementById('notification');
            el.textContent = msg;
            el.className = `notification show ${type}`;
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        function toggleUserDropdown(e) { e.stopPropagation(); document.getElementById('userDropdown').classList.toggle('show'); }
        document.addEventListener('click', () => document.getElementById('userDropdown').classList.remove('show'));

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        async function loadProfile() {
            try {
                const token = sessionStorage.getItem('auth_token');
                const r = await fetch('/api/profile', { headers: { 'Authorization': `Bearer ${token}` } });
                if (r.ok) {
                    const p = await r.json();
                    const name = p.display_name || p.username || 'Admin';
                    document.getElementById('headerDisplayName').textContent = name;
                    const avatarEl = document.getElementById('headerAvatar');
                    if (p.avatar) {
                        const img = document.createElement('img');
                        img.src = p.avatar;
                        img.alt = '';
                        avatarEl.textContent = '';
                        avatarEl.appendChild(img);
                    } else {
                        const span = document.createElement('span');
                        span.textContent = name.charAt(0).toUpperCase();
                        avatarEl.textContent = '';
                        avatarEl.appendChild(span);
                    }
                    if (p.theme_preference) applyTheme(p.theme_preference);
                }
            } catch {}
        }

        async function loadUsers() {
            try {
                const token = sessionStorage.getItem('auth_token');
                const r = await fetch('/api/users', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!r.ok) throw new Error();
                const users = await r.json();
                const tbody = document.getElementById('userTableBody');

                if (!users || users.length === 0) {
                    tbody.textContent = '';
                    const emptyRow = document.createElement('tr');
                    const emptyCell = document.createElement('td');
                    emptyCell.colSpan = 4;
                    emptyCell.className = 'text-muted';
                    emptyCell.style.textAlign = 'center';
                    emptyCell.textContent = 'No users found';
                    emptyRow.appendChild(emptyCell);
                    tbody.appendChild(emptyRow);
                    return;
                }

                tbody.textContent = '';
                users.forEach(u => {
                    const tr = document.createElement('tr');
                    
                    const tdName = document.createElement('td');
                    const strong = document.createElement('strong');
                    strong.textContent = u.username;
                    tdName.appendChild(strong);
                    if (u.email) {
                        tdName.appendChild(document.createElement('br'));
                        const emailSpan = document.createElement('span');
                        emailSpan.className = 'text-muted';
                        emailSpan.style.fontSize = '0.8rem';
                        emailSpan.textContent = u.email;
                        tdName.appendChild(emailSpan);
                    }
                    tr.appendChild(tdName);
                    
                    const tdRole = document.createElement('td');
                    if (u.is_admin) {
                        const badge = document.createElement('span');
                        badge.className = 'admin-badge';
                        badge.textContent = 'Admin';
                        tdRole.appendChild(badge);
                    } else {
                        tdRole.textContent = 'User';
                    }
                    tr.appendChild(tdRole);
                    
                    const tdStatus = document.createElement('td');
                    const statusBadge = document.createElement('span');
                    statusBadge.className = 'badge ' + (u.is_active !== false ? 'badge-success' : 'badge-danger');
                    statusBadge.textContent = u.is_active !== false ? 'Active' : 'Inactive';
                    tdStatus.appendChild(statusBadge);
                    tr.appendChild(tdStatus);
                    
                    const tdActions = document.createElement('td');
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'user-actions';
                    const resetBtn = document.createElement('button');
                    resetBtn.className = 'btn btn-sm btn-secondary';
                    resetBtn.textContent = 'Reset';
                    resetBtn.addEventListener('click', () => showResetPasswordModal(u.username));
                    actionsDiv.appendChild(resetBtn);
                    if (u.username !== 'admin') {
                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'btn btn-sm btn-danger';
                        deleteBtn.textContent = 'Delete';
                        deleteBtn.addEventListener('click', () => deleteUser(u.username));
                        actionsDiv.appendChild(deleteBtn);
                    }
                    tdActions.appendChild(actionsDiv);
                    tr.appendChild(tdActions);
                    
                    tbody.appendChild(tr);
                });
            } catch {
                const failTbody = document.getElementById('userTableBody');
                failTbody.textContent = '';
                const failRow = document.createElement('tr');
                const failCell = document.createElement('td');
                failCell.colSpan = 4;
                failCell.className = 'text-muted';
                failCell.style.textAlign = 'center';
                failCell.textContent = 'Failed to load';
                failRow.appendChild(failCell);
                failTbody.appendChild(failRow);
            }
        }

        function showCreateUserModal() {
            document.getElementById('createUserModal').classList.add('show');
            document.getElementById('createUserForm').reset();
        }

        function hideCreateUserModal() { document.getElementById('createUserModal').classList.remove('show'); }

        function showResetPasswordModal(username) {
            currentResetUser = username;
            document.getElementById('resetUsername').textContent = username;
            document.getElementById('resetPasswordModal').classList.add('show');
            document.getElementById('resetPasswordForm').reset();
        }

        function hideResetPasswordModal() { document.getElementById('resetPasswordModal').classList.remove('show'); currentResetUser = null; }

        async function handleCreateUser(e) {
            e.preventDefault();
            const data = {
                username: document.getElementById('newUsername').value.trim(),
                password: document.getElementById('newPassword').value,
                email: document.getElementById('newEmail').value.trim(),
                is_admin: document.getElementById('newIsAdmin').checked
            };

            if (data.password.length < 6) { showNotification('Password must be at least 6 characters', 'error'); return; }

            try {
                const token = sessionStorage.getItem('auth_token');
                const r = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (r.ok) { showNotification('User created', 'success'); hideCreateUserModal(); await loadUsers(); }
                else { const res = await r.json(); showNotification(res.error || 'Failed', 'error'); }
            } catch { showNotification('Failed to create user', 'error'); }
        }

        async function handleResetPassword(e) {
            e.preventDefault();
            const newPwd = document.getElementById('resetNewPassword').value;
            if (newPwd.length < 6) { showNotification('Password must be at least 6 characters', 'error'); return; }

            try {
                const token = sessionStorage.getItem('auth_token');
                const r = await fetch(`/api/users/${encodeURIComponent(currentResetUser)}/password`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: newPwd })
                });
                if (r.ok) { showNotification(`Password reset for ${currentResetUser}`, 'success'); hideResetPasswordModal(); }
                else { const res = await r.json(); showNotification(res.error || 'Failed', 'error'); }
            } catch { showNotification('Failed to reset password', 'error'); }
        }

        async function deleteUser(username) {
            if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
            try {
                const token = sessionStorage.getItem('auth_token');
                const r = await fetch(`/api/users/${encodeURIComponent(username)}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (r.ok) { showNotification(`User ${username} deleted`, 'success'); await loadUsers(); }
                else { const res = await r.json(); showNotification(res.error || 'Failed', 'error'); }
            } catch { showNotification('Failed to delete user', 'error'); }
        }

        function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

        // Modal close on outside click
        document.querySelectorAll('.modal').forEach(m => {
            m.addEventListener('click', e => { if (e.target === m) m.classList.remove('show'); });
        });

        async function init() {
            const token = sessionStorage.getItem('auth_token');
            if (!token) { window.location.replace('login.html'); return; }
            try { const r = await fetch('/api/auth/verify', { headers: { 'Authorization': `Bearer ${token}` } }); if (!r.ok) throw 0; } catch { sessionStorage.clear(); window.location.replace('login.html'); return; }

            const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
            if (!isAdmin) {
                showNotification('Access denied. Admin privileges required.', 'error');
                setTimeout(() => window.location.replace('dashboard.html'), 2000);
                return;
            }

            applyTheme(currentTheme);
            await loadProfile();
            await loadUsers();
        }

        document.readyState === 'loading' ? document.addEventListener('DOMContentLoaded', init) : init();
    </script>
</body>
</html>
