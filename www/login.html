<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Manager Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: #333;
            margin: 0;
            font-size: 28px;
        }
        .login-header p {
            color: #666;
            margin: 5px 0 0 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error-message {
            color: #e74c3c;
            margin-top: 10px;
            padding: 10px;
            background: #ffeaea;
            border-radius: 5px;
            display: none;
        }
        .success-message {
            color: #27ae60;
            margin-top: 10px;
            padding: 10px;
            background: #eafaf1;
            border-radius: 5px;
            display: none;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
        }
        .help-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Server Manager</h1>
            <p>Please sign in to continue</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            <div id="loading" class="loading">Signing in...</div>
        </form>
    </div>

    <!-- Notification System -->
    <div id="notification" class="notification"></div>

    <script>
        let attempts = 0;
        const maxAttempts = 3;
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const loadingDiv = document.getElementById('loading');
            
            // Input validation
            if (!username || !password) {
                errorDiv.textContent = 'Please enter both username and password.';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Reset messages
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            loadingDiv.style.display = 'block';
            loginBtn.disabled = true;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                let data;
                try {
                    const responseText = await response.text();
                    try {
                        data = JSON.parse(responseText);
                    } catch (jsonError) {
                        console.error('Server returned non-JSON response:', responseText);
                        data = { error: 'Server returned invalid response format' };
                    }
                } catch (parseError) {
                    console.error('Failed to read response:', parseError);
                    data = { error: 'Failed to read server response' };
                }
                
                if (response.ok && data.token) {
                    // Store token in session storage
                    sessionStorage.setItem('auth_token', data.token);
                    sessionStorage.setItem('username', data.username);
                    sessionStorage.setItem('isAdmin', data.isAdmin ? 'true' : 'false');
                    
                    console.log('Login successful:', { username: data.username, isAdmin: data.isAdmin });
                    
                    // Show success message
                    successDiv.textContent = 'Login successful! Redirecting...';
                    successDiv.style.display = 'block';
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    attempts++;
                    if (attempts >= maxAttempts) {
                        errorDiv.textContent = 'Too many failed attempts. Please try again later.';
                        loginBtn.disabled = true;
                    } else {
                        let errorMsg = 'Authentication failed';
                        if (data && data.error) {
                            errorMsg = data.error;
                        } else if (response.status === 401) {
                            errorMsg = 'Invalid username or password';
                        } else if (response.status === 500) {
                            errorMsg = 'Server error. Please try again later or contact administrator';
                        } else if (response.status === 400) {
                            errorMsg = 'Invalid request. Please check your input';
                        } else if (response.status === 403) {
                            errorMsg = 'Access forbidden. You may not have permission to access this resource';
                        } else if (response.status === 404) {
                            errorMsg = 'Authentication service not found. Please check server configuration';
                        } else if (response.status >= 500) {
                            errorMsg = 'Server error. Please try again later';
                        }
                        
                        if (errorMsg.includes('Invalid username or password')) {
                            errorDiv.textContent = `${errorMsg}. Try using 'admin'/'admin' or your Windows credentials. ${maxAttempts - attempts} attempts remaining.`;
                        } else {
                            errorDiv.textContent = `${errorMsg}. ${maxAttempts - attempts} attempts remaining.`;
                        }
                        errorDiv.style.display = 'block';
                        console.log('Login failed:', { status: response.status, statusText: response.statusText, data: data });
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                attempts++;
                if (attempts >= maxAttempts) {
                    errorDiv.textContent = 'Connection error. Too many attempts.';
                    loginBtn.disabled = true;
                } else {
                    if (error.name === 'TypeError' && error.message.includes('fetch')) {
                        errorDiv.textContent = `Cannot connect to server. Please check if the server is running on the correct port. ${maxAttempts - attempts} attempts remaining.`;
                    } else if (error.message.includes('NetworkError') || error.message.includes('Failed to fetch')) {
                        errorDiv.textContent = `Network error. Please check your connection and server status. ${maxAttempts - attempts} attempts remaining.`;
                    } else {
                        errorDiv.textContent = `Connection error: ${error.message}. ${maxAttempts - attempts} attempts remaining.`;
                    }
                    errorDiv.style.display = 'block';
                }
            } finally {
                loadingDiv.style.display = 'none';
                if (attempts < maxAttempts) {
                    loginBtn.disabled = false;
                }
            }
        });

        // Check server connectivity on page load
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                console.log('Testing server connectivity...');
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'test', password: 'test' })
                });
                console.log('Server response status:', response.status);
                if (response.status === 400) {
                    console.log('Server is responding correctly');
                } else if (response.status === 200) {
                    console.log('Server authentication endpoint is working');
                }
            } catch (error) {
                console.error('Server connectivity test failed:', error);
                document.getElementById('errorMessage').textContent = 'Cannot connect to server. Please check if the server is running and accessible.';
                document.getElementById('errorMessage').style.display = 'block';
            }

            // Check if already logged in
            try {
                const token = sessionStorage.getItem('auth_token');
                if (token) {
                    // Verify token is still valid
                    const response = await fetch('/api/auth/verify', {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.authenticated) {
                            window.location.replace('dashboard.html');
                        }
                    } else {
                        // Token is invalid, clear it
                        sessionStorage.clear();
                    }
                }
            } catch (error) {
                console.error('Auth check error:', error);
                sessionStorage.clear();
            }
        });
    </script>
</body>
</html>
